<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Field Ledger — LITE Programme Monitoring</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper: #F2ECDC; --panel: #EAE2CC; --rule: #C9BD9C;
    --ink: #20251F; --ink-soft: #5B5C4E;
    --amber: #B8862E; --amber-soft: #E9D4A2;
    --teal: #1F6F62; --teal-soft: #BFDED7;
    --rust: #A23E2C; --rust-soft: #E9C3B8;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:1280px;margin:0 auto;padding:24px 22px 64px;}

  header{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:14px;border-bottom:3px solid var(--ink);padding-bottom:14px;margin-bottom:18px;}
  .brand-eyebrow{font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);}
  .watermark{font-family:'IBM Plex Mono',monospace;font-size:9.5px;letter-spacing:.03em;color:var(--ink-soft);opacity:.65;margin-top:2px;}
  h1{font-family:'Archivo',sans-serif;font-weight:800;font-size:27px;line-height:1.08;margin:4px 0 0;letter-spacing:-.01em;}
  .status-line{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--ink-soft);text-align:right;}
  .status-line strong{color:var(--ink);}
  .share-controls{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;}

  .btn{font-family:'Archivo',sans-serif;font-weight:600;font-size:13px;background:var(--amber);color:var(--ink);border:none;border-radius:7px;padding:8px 14px;cursor:pointer;letter-spacing:.02em;}
  .btn:hover{background:var(--amber-soft);}
  .btn.ghost{background:transparent;color:var(--ink);border:1.5px solid var(--ink);}
  .btn.ghost:hover{background:var(--ink);color:var(--paper);}
  .btn.small{padding:6px 10px;font-size:12px;}
  .btn:focus-visible, select:focus-visible, input:focus-visible{outline:3px solid var(--teal-soft);outline-offset:2px;}

  /* tab nav */
  .tabnav{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px;border-bottom:1.5px solid var(--rule);padding-bottom:10px;}
  .tab-group-label{font-family:'IBM Plex Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-soft);align-self:center;margin-right:2px;}
  .tab-btn{
    font-family:'Archivo',sans-serif;font-weight:600;font-size:12.5px;
    background:var(--panel);color:var(--ink-soft);border:1.5px solid var(--rule);
    border-radius:7px;padding:7px 12px;cursor:pointer;
  }
  .tab-btn.active{background:var(--ink);color:var(--paper);border-color:var(--ink);}
  .tab-btn .dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px;vertical-align:middle;}
  .tab-btn .dot.ok{background:var(--teal);}
  .tab-btn .dot.pending{background:var(--rust);}
  .tab-spacer{flex:1 1 100%;height:0;}

  .panel{display:none;}
  .panel.show{display:block;}

  .card{background:var(--panel);border-radius:12px;padding:20px;border:1px solid var(--rule);margin-bottom:18px;}
  .card h3{font-family:'IBM Plex Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-soft);margin:0 0 12px;}
  .card-title-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
  .card-title-row h2{font-family:'Archivo',sans-serif;font-size:18px;margin:0;}
  .card-title-row .sub{font-size:12px;color:var(--ink-soft);font-family:'IBM Plex Mono',monospace;}

  .livesource-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
  .livesource-row input[type=text]{flex:1;min-width:240px;font-family:'IBM Plex Mono',monospace;font-size:12.5px;padding:9px 10px;border-radius:6px;border:1.5px solid var(--rule);background:var(--paper);color:var(--ink);}
  .livesource-status{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--ink-soft);margin-top:8px;}
  .livesource-note{font-size:12px;color:var(--ink-soft);}

  select, input[type=number], input[type=text]{font-family:'Inter',sans-serif;font-size:13.5px;padding:8px 10px;border-radius:6px;border:1.5px solid var(--rule);background:var(--paper);color:var(--ink);}
  .map-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px;margin-top:12px;}
  .map-field label{display:block;font-family:'IBM Plex Mono',monospace;font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft);margin-bottom:5px;}
  .map-field select, .map-field input{width:100%;}

  .kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;}
  .kpi{background:var(--paper);border:1px solid var(--rule);border-radius:9px;padding:14px 16px;}
  .kpi .num{font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:25px;}
  .kpi .lbl{font-size:11.5px;color:var(--ink-soft);margin-top:3px;line-height:1.3;}
  .kpi .pct{font-family:'IBM Plex Mono',monospace;font-size:12px;margin-top:4px;}
  .kpi .pct.ok{color:var(--teal);} .kpi .pct.mid{color:var(--amber);} .kpi .pct.low{color:var(--rust);}

  table{width:100%;border-collapse:collapse;}
  thead th{text-align:left;font-family:'IBM Plex Mono',monospace;font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-soft);border-bottom:2px solid var(--ink);padding:7px 9px;}
  tbody td{padding:8px 9px;border-bottom:1px solid var(--rule);font-size:13px;vertical-align:middle;}
  tbody tr:hover{background:rgba(184,134,46,.07);}
  .bar-track{height:8px;background:var(--rule);border-radius:5px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:5px;background:var(--teal);}
  .matrix-cell{font-family:'IBM Plex Mono',monospace;font-size:12px;text-align:center;}
  .matrix-cell .frac{font-weight:600;}
  .matrix-cell .pctbar{height:5px;border-radius:3px;background:var(--rule);margin-top:4px;overflow:hidden;}
  .matrix-cell .pctbar-fill{height:100%;background:var(--teal);}

  .badge{font-family:'IBM Plex Mono',monospace;font-size:10.5px;padding:2px 7px;border-radius:5px;}
  .badge.ok{background:var(--teal-soft);color:var(--teal);}
  .badge.behind{background:var(--rust-soft);color:var(--rust);}
  .badge.neutral{background:var(--rule);color:var(--ink-soft);}

  .gap-list{max-height:340px;overflow-y:auto;border:1px solid var(--rule);border-radius:8px;}
  .gap-list table{margin:0;}
  .empty-note{color:var(--ink-soft);font-style:italic;font-size:13px;padding:8px 0;}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--paper);font-family:'IBM Plex Mono',monospace;font-size:12px;padding:10px 18px;border-radius:8px;opacity:0;transition:opacity .25s;pointer-events:none;z-index:50;}
  .toast.show{opacity:1;}

  .chart-wrap{height:240px;}
  footer{margin-top:30px;font-size:12px;color:var(--ink-soft);text-align:center;}

  @media print{
    .tabnav, .livesource-row, .map-grid, .share-controls, .btn{display:none !important;}
    .panel{display:block !important;}
    body{background:#fff;}
    .card{break-inside:avoid;border:1px solid #999;}
  }
</style>
</head>

const CORS_PROXIES = [
  url => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url),
  url => 'https://api.codetabs.com/v1/proxy/?quest=' + encodeURIComponent(url),
  url => 'https://corsproxy.io/?url=' + encodeURIComponent(url)
];
const PROXY_TIMEOUT_MS = 8000;
const __lastGoodMethod = {}; // url -> 'direct' or proxy index, so repeat loads skip straight to what worked

async function fetchWithTimeout(targetUrl, ms){
  const controller = new AbortController();
  const timer = setTimeout(()=>controller.abort(), ms);
  try{
    const res = await fetch(targetUrl, {cache:'no-store', signal:controller.signal});
    return res;
  }finally{ clearTimeout(timer); }
}

async function fetchCsvText(url){
  const tryDirect = async ()=>{
    const res = await fetchWithTimeout(url, PROXY_TIMEOUT_MS);
    if(!res.ok) throw new Error('HTTP ' + res.status);
    return await res.text();
  };
  const tryProxy = async (i)=>{
    const res = await fetchWithTimeout(CORS_PROXIES[i](url), PROXY_TIMEOUT_MS);
    if(!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    if(!text || text.trim().length===0) throw new Error('empty response');
    return text;
  };

  // try whatever worked last time for this exact URL first
  const remembered = __lastGoodMethod[url];
  if(remembered !== undefined){
    try{
      const text = remembered==='direct' ? await tryDirect() : await tryProxy(remembered);
      return { text, viaProxy: remembered!=='direct' };
    }catch(e){ /* fall through to full chain below */ }
  }

  let firstErr = null;
  try{
    const text = await tryDirect();
    __lastGoodMethod[url] = 'direct';
    return { text, viaProxy:false };
  }catch(directErr){ firstErr = directErr; }

  for(let i=0; i<CORS_PROXIES.length; i++){
    if(i===remembered) continue; // already tried above
    try{
      const text = await tryProxy(i);
      __lastGoodMethod[url] = i;
      return { text, viaProxy:true };
    }catch(proxyErr){ /* try next */ }
  }
  throw firstErr;
}

function guessField(headers, patterns){
  for(const h of headers){
    const lh = h.toLowerCase();
    if(patterns.some(p=>lh.includes(p))) return h;
  }
  return '';
}

  return opts;
}

function wireFormPanel(form){
  const st = STATE[form.id];
  document.getElementById('mt-connectBtn').addEventListener('click', async ()=>{
    const url = document.getElementById('mt-urlInput').value.trim();
    if(!url){ toast('Paste a data link first.'); return; }
    const statusEl = document.getElementById('mt-status');
    statusEl.textContent = 'Fetching… (trying a couple of connection methods, can take up to ~15s the first time)';
    try{
      const { text, viaProxy } = await fetchCsvText(url);
      const res = Papa.parse(text, {header:true, skipEmptyLines:true});
      st.rawRows = res.data;
      st.headers = res.meta.fields || Object.keys(st.rawRows[0]||{});
      if(LS) LS.setItem(LS_PREFIX+form.id+':url', url);
      autoGuessMapping(form);
      statusEl.textContent = `${st.rawRows.length} rows loaded${viaProxy?' (via CORS relay)':''}`;
      renderPanels();
    }catch(err){
      statusEl.textContent = 'Could not load that link.';
      toast('Could not load the data link for ' + form.short + '.');
    }
  });
  document.getElementById('mt-disconnectBtn').addEventListener('click', ()=>{
    if(LS) LS.removeItem(LS_PREFIX+form.id+':url');
    document.getElementById('mt-urlInput').value = '';
    st.rawRows = null; st.headers = []; st.built = false;
    renderPanels(); renderTabNav();
  });
  if(st.headers.length){
    document.getElementById('mt-buildBtn').addEventListener('click', ()=>{
      readMappingFromUI(form);
      computeFormCoverage(form);
      st.built = true;
      renderTabNav();
      document.getElementById('mt-results').innerHTML = renderFormResults(form);
      wireFormResults(form);
    });
  }
  if(st.built){ wireFormResults(form); }
}

function autoGuessMapping(form){
  const st = STATE[form.id];
  const h = st.headers;
  if(form.level==='school'){
    st.mapping.matchType = st.mapping.matchType || 'code';
    st.mapping.matchField = guessField(h, ['schoolcode','school_code','sch_code','code']) || guessField(h, ['school']) || h[0];
    st.mapping.dateField = guessField(h, ['submissiondate','date','today','_submission_time']);
  } else if(form.level==='woreda'){
    st.mapping.regionField = guessField(h, ['region']);
    st.mapping.woredaField = guessField(h, ['woreda']);
    st.mapping.dateField = guessField(h, ['submissiondate','date','today','_submission_time']);
  } else {
    st.mapping.regionField = guessField(h, ['region']);
    st.mapping.zoneField = guessField(h, ['zone']);
    st.mapping.dateField = guessField(h, ['submissiondate','date','today','_submission_time']);
  }
}

function readMappingFromUI(form){
  const st = STATE[form.id];
  if(form.level==='school'){
    st.mapping.matchType = document.getElementById('mt-matchType').value;
    st.mapping.matchField = document.getElementById('mt-matchField').value;
  } else if(form.level==='woreda'){
    st.mapping.regionField = document.getElementById('mt-regionField').value;
    st.mapping.woredaField = document.getElementById('mt-woredaField').value;
  } else {
    st.mapping.regionField = document.getElementById('mt-regionField').value;
    st.mapping.zoneField = document.getElementById('mt-zoneField').value;
  }
  st.mapping.dateField = document.getElementById('mt-dateField').value;
}

function rowKeyFor(form, row, mapping){
  if(form.level==='school'){
    const raw = row[mapping.matchField];
    if(mapping.matchType==='name') return normName(raw);
    const n = parseInt((raw||'').toString().replace(/[^0-9]/g,''));
    return isNaN(n) ? null : n;
  } else if(form.level==='woreda'){
    const r = row[mapping.regionField], w = row[mapping.woredaField];
    if(!w) return null;
    return normName(r)+'|'+normName(w);
  } else {
    const r = row[mapping.regionField], z = row[mapping.zoneField];
    if(!z) return null;
    return normName(r)+'|'+normName(z);
  }
}

function parseDateKey(val){
  if(!val) return null;
  const d = new Date(val);
  if(!isNaN(d.getTime())) return d.toISOString().slice(0,10);
  return String(val).split(' ')[0];
}

function computeFormCoverage(form){
  const st = STATE[form.id];
  const mapping = { matchType: st.mapping.matchType, matchField: st.mapping.matchField, regionField: st.mapping.regionField, woredaField: st.mapping.woredaField, zoneField: st.mapping.zoneField };
  const targets = (function(){
    if(form.level==='school'){
      return REF.schools.map(s=>({ key: mapping.matchType==='name' ? normName(s.n) : s.c, region:s.r, zone:s.z, woreda:s.w, label:s.n, code:s.c }));
    } else if(form.level==='woreda'){
      return REF.woredas.map(w=>({ key: normName(w.r)+'|'+normName(w.w), region:w.r, zone:w.z, label:w.w }));
    } else {
      return REF.zones.map(z=>({ key: normName(z.r)+'|'+normName(z.z), region:z.r, zone:z.z, label:z.z }));
    }
  })();
  const targetKeySet = new Map();
  targets.forEach(t=>{ if(!targetKeySet.has(t.key)) targetKeySet.set(t.key, []); targetKeySet.get(t.key).push(t); });

  const submittedKeyCounts = new Map();
  const unmatched = [];
  const dated = [];
  (st.rawRows||[]).forEach(row=>{
    const key = rowKeyFor(form, row, mapping);
    const day = mapping.dateField ? parseDateKey(row[mapping.dateField]) : null;
    dated.push({row, key, day});
    if(key===null || key==='' || !targetKeySet.has(key)){
      unmatched.push(row);
    } else {
      submittedKeyCounts.set(key, (submittedKeyCounts.get(key)||0)+1);
    }
  });

  targets.forEach(t=>{ t.submissions = submittedKeyCounts.get(t.key)||0; t.done = t.submissions>0; });
  const doneCount = targets.filter(t=>t.done).length;
  const duplicateCount = targets.filter(t=>t.submissions>1).length;

  const byRegion = {};
  targets.forEach(t=>{
    if(!byRegion[t.region]) byRegion[t.region] = {done:0, total:0};
    byRegion[t.region].total++;
    if(t.done) byRegion[t.region].done++;
  });

  const days = [...new Set(dated.map(d=>d.day).filter(Boolean))].sort();

  st.results = { targets, doneCount, totalTargets: targets.length, byRegion, unmatched, duplicateCount, days, dated };
}

function pctClass(pct){ return pct>=90 ? 'ok' : (pct>=50 ? 'mid' : 'low'); }

function renderFormResults(form){
  const st = STATE[form.id];
  const r = st.results;
  if(!r) return '';
  const pct = r.totalTargets ? Math.round((r.doneCount/r.totalTargets)*100) : 0;
  const levelLabel = form.level==='school' ? 'schools' : (form.level==='woreda' ? 'woredas' : 'zones');
  const regionRows = Object.entries(r.byRegion).sort((a,b)=>b[1].total-a[1].total).map(([region,v])=>{
    const p = v.total? Math.round((v.done/v.total)*100):0;
    return `<tr><td>${escapeHtml(region)}</td><td>${v.done} / ${v.total}</td>
      <td class="bar-cell"><div class="bar-track"><div class="bar-fill" style="width:${p}%;background:${p>=90?'var(--teal)':(p>=50?'var(--amber)':'var(--rust)')}"></div></div></td>
      <td>${p}%</td></tr>`;
  }).join('');

  const missing = r.targets.filter(t=>!t.done);
  const gapRows = missing.slice(0,500).map(t=>{
    const loc = form.level==='school' ? `${escapeHtml(t.region)} / ${escapeHtml(t.zone)} / ${escapeHtml(t.woreda)}` : escapeHtml(t.region);
    const label = form.level==='school' ? `${escapeHtml(t.label)} (code ${t.code})` : escapeHtml(t.label);
    return `<tr><td>${label}</td><td>${loc}</td></tr>`;
  }).join('');

  const unmatchedRows = r.unmatched.slice(0,200).map(row=>{
    const mapping = st.mapping;
    const shown = form.level==='school' ? row[mapping.matchField] : (form.level==='woreda' ? `${row[mapping.regionField]||''} / ${row[mapping.woredaField]||''}` : `${row[mapping.regionField]||''} / ${row[mapping.zoneField]||''}`);
    return `<tr><td>${escapeHtml(shown)}</td></tr>`;
  }).join('');

  let trendHtml = '';
  if(r.days.length){
    trendHtml = `<div class="card"><h3>Submissions over time</h3><div class="chart-wrap"><canvas id="mt-trendChart"></canvas></div></div>`;
  }

  return `
    <div class="card">
      <div class="kpi-row">
        <div class="kpi"><div class="num">${(st.rawRows||[]).length}</div><div class="lbl">Total submissions received</div></div>
        <div class="kpi"><div class="num">${r.doneCount} / ${r.totalTargets}</div><div class="lbl">${levelLabel} reporting</div><div class="pct ${pctClass(pct)}">${pct}% of target</div></div>
        <div class="kpi"><div class="num">${missing.length}</div><div class="lbl">${levelLabel} still missing</div></div>
        <div class="kpi"><div class="num">${r.duplicateCount}</div><div class="lbl">Re-submitted (more than 1 entry)</div></div>
        <div class="kpi"><div class="num">${r.unmatched.length}</div><div class="lbl">Submissions not matched to target list</div></div>
      </div>
    </div>
    <div class="card">
      <h3>Progress by region</h3>
      <table><thead><tr><th>Region</th><th>Done / Target</th><th style="width:30%;">Progress</th><th>%</th></tr></thead>
      <tbody>${regionRows}</tbody></table>
    </div>
    ${trendHtml}
    <div class="card">
      <div class="card-title-row"><h3 style="margin:0;">Still missing (${missing.length})</h3><span class="sub">for follow-up</span></div>
      ${missing.length ? `<div class="gap-list"><table><thead><tr><th>${form.level==='school'?'School':'Name'}</th><th>Location</th></tr></thead><tbody>${gapRows}</tbody></table></div>${missing.length>500?'<p class="empty-note">Showing first 500.</p>':''}` : `<p class="empty-note">None — full coverage reached.</p>`}
    </div>
    <div class="card">
      <div class="card-title-row"><h3 style="margin:0;">Unmatched submissions (${r.unmatched.length})</h3><span class="sub">didn't match anything in the target list — check for typos</span></div>
      ${r.unmatched.length ? `<div class="gap-list"><table><thead><tr><th>Submitted value</th></tr></thead><tbody>${unmatchedRows}</tbody></table></div>` : `<p class="empty-note">None — every submission matched a known target.</p>`}
    </div>
  `;
}

function wireFormResults(form){
  const st = STATE[form.id];
  const r = st.results;
  if(!r || !r.days.length) return;
  const ctx = document.getElementById('mt-trendChart');
  if(!ctx) return;
  if(window.__formChart) window.__formChart.destroy();
  const counts = r.days.map(d=>r.dated.filter(x=>x.day===d).length);
  window.__formChart = new Chart(ctx.getContext('2d'), {
    type:'bar',
    data:{ labels:r.days, datasets:[{ label:'Submissions', data:counts, backgroundColor:'#B8862E', borderRadius:4, maxBarThickness:30 }] },
    options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}},
      scales:{ x:{grid:{display:false},ticks:{color:'#5B5C4E',font:{family:'IBM Plex Mono',size:10}}},
               y:{beginAtZero:true,grid:{color:'#D8CFB8'},ticks:{color:'#5B5C4E',font:{family:'IBM Plex Mono',size:10}}} }
    }
  });
}

function renderOverviewPanel(){
  const builtForms = FORMS.filter(f=>STATE[f.id].built);
  if(!builtForms.length){
    return `<div class="card"><h3>Get started</h3><p>Connect at least one form's live data link (use the tabs above) to see overview numbers here. Build a few forms, then come back to this tab for the cross-form picture.</p></div>`;
  }

  const kpiCards = FORMS.map(f=>{
    const st = STATE[f.id];
    if(!st.built) return `<div class="kpi"><div class="num">—</div><div class="lbl">${escapeHtml(f.short)}</div><div class="pct">not connected</div></div>`;
    const r = st.results;
    const pct = r.totalTargets ? Math.round((r.doneCount/r.totalTargets)*100) : 0;
    const totalSubmissions = st.rawRows ? st.rawRows.length : 0;
    return `<div class="kpi"><div class="num">${r.doneCount}/${r.totalTargets}</div><div class="lbl">${escapeHtml(f.short)}</div><div class="pct ${pctClass(pct)}">${pct}% covered</div><div class="pct" style="color:var(--ink-soft);">${totalSubmissions} total submissions</div></div>`;
  }).join('');

  const grandTotalSubmissions = FORMS.reduce((sum,f)=> sum + (STATE[f.id].built && STATE[f.id].rawRows ? STATE[f.id].rawRows.length : 0), 0);
  const grandTotalCard = `<div class="card"><div class="kpi-row">
      <div class="kpi"><div class="num">${grandTotalSubmissions}</div><div class="lbl">Grand total submissions received across all connected forms</div></div>
    </div></div>`;

  // schools complete across all 5 school-level forms
  const schoolForms = FORMS.filter(f=>f.level==='school' && STATE[f.id].built);
  let allCompleteHtml = '';
  if(schoolForms.length){
    const doneSets = schoolForms.map(f=>new Set(STATE[f.id].results.targets.filter(t=>t.done).map(t=>t.code)));
    const allCompleteCount = REF.schools.filter(s=>doneSets.every(set=>set.has(s.c))).length;
    allCompleteHtml = `<div class="card"><div class="kpi-row">
      <div class="kpi"><div class="num">${allCompleteCount} / ${REF.schools.length}</div><div class="lbl">Schools complete on ALL connected school-level forms (${schoolForms.length} of 5 connected)</div></div>
    </div></div>`;
  }

  // region x form matrix (derive region list from schools data itself, so naming always matches byRegion keys)
  const regions = [...new Set(REF.schools.map(s=>s.r))];
  const matrixRows = regions.map(region=>{
    const cells = FORMS.map(f=>{
      const st = STATE[f.id];
      if(!st.built) return `<td class="matrix-cell">—</td>`;
      const v = st.results.byRegion[region];
      if(!v) return `<td class="matrix-cell">—</td>`;
      const p = v.total? Math.round((v.done/v.total)*100):0;
      return `<td class="matrix-cell"><span class="frac">${v.done}/${v.total}</span><div class="pctbar"><div class="pctbar-fill" style="width:${p}%;background:${p>=90?'var(--teal)':(p>=50?'var(--amber)':'var(--rust)')}"></div></div></td>`;
    }).join('');
    return `<tr><td>${escapeHtml(region)}</td>${cells}</tr>`;
  }).join('');
  const matrixHeader = FORMS.map(f=>`<th>${escapeHtml(f.short)}</th>`).join('');

  return `
    <div class="card"><h3>Coverage by form</h3><div class="kpi-row">${kpiCards}</div></div>
    ${grandTotalCard}
    ${allCompleteHtml}
    <div class="card">
      <h3>Region × form completion matrix</h3>
      <div style="overflow-x:auto;"><table><thead><tr><th>Region</th>${matrixHeader}</tr></thead><tbody>${matrixRows}</tbody></table></div>
    </div>
  `;
}

document.getElementById('printBtn').addEventListener('click', ()=>window.print());

document.getElementById('clientLinkBtn').addEventListener('click', ()=>{
  const cfg = {};
  let any = false;
  FORMS.forEach(f=>{
    const st = STATE[f.id];
    const url = (LS && LS.getItem(LS_PREFIX+f.id+':url')) || '';
    if(url && st.headers.length){
      cfg[f.id] = { url, mapping: st.mapping };
      any = true;
    }
  });
  if(!any){ toast('Connect and build at least one form first.'); return; }
  const base = location.origin + location.pathname;
  const link = base + '?cfg=' + encodeURIComponent(JSON.stringify(cfg));
  window.prompt('Copy this link and send it to your client. It loads all connected forms automatically — no setup on their end:', link);
});

async function initClientView(){
  const params = new URLSearchParams(location.search);
  const cfgRaw = params.get('cfg');
  if(!cfgRaw) return;
  let cfg;
  try{ cfg = JSON.parse(decodeURIComponent(cfgRaw)); }catch(e){ return; }
  document.getElementById('statusLine').innerHTML = '<strong>Live dashboard</strong> · loading all forms…';
  for(const f of FORMS){
    if(!cfg[f.id]) continue;
    const st = STATE[f.id];
    try{
      const { text } = await fetchCsvText(cfg[f.id].url);
      const res = Papa.parse(text, {header:true, skipEmptyLines:true});
      st.rawRows = res.data;
      st.headers = res.meta.fields || Object.keys(st.rawRows[0]||{});
      st.mapping = cfg[f.id].mapping;
      computeFormCoverage(f);
      st.built = true;
    }catch(e){ /* skip this form, continue others */ }
  }
  document.getElementById('statusLine').innerHTML = `<strong>Live dashboard</strong> · refreshed ${new Date().toLocaleString()}`;
  activeTab = 'overview';
  renderTabNav();
  renderPanels();
}

(async function init(){
  await initClientView();
  renderTabNav();
  renderPanels();
  if(LS){
    FORMS.forEach(f=>{
      const saved = LS.getItem(LS_PREFIX+f.id+':url');
      if(saved && !STATE[f.id].headers.length){
        fetchCsvText(saved).then(({text})=>{
          const st = STATE[f.id];
          const res = Papa.parse(text, {header:true, skipEmptyLines:true});
          st.rawRows = res.data;
          st.headers = res.meta.fields || Object.keys(st.rawRows[0]||{});
          autoGuessMapping(f);
          if(activeTab===f.id) renderPanels();
        }).catch(()=>{});
      }
    });
  }
})();
</script>
